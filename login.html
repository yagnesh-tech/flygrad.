<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup - FlyGrad</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #fcb69f, #f9ea8f, #b5fffc);
      background-size: 400% 400%;
      animation: vibrantBG 18s ease-in-out infinite;
      min-height: 100vh;
    }
    @keyframes vibrantBG {
      0% {background-position: 0% 50%;}
      25% {background-position: 50% 100%;}
      50% {background-position: 100% 50%;}
      75% {background-position: 50% 0%;}
      100% {background-position: 0% 50%;}
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .tab-btn.active {
      background: #2563eb;
      color: #fff;
    }
    /* Enhanced Header Styles */
    .header-glow {
      box-shadow: 0 0 24px 0 #60a5fa55, 0 4px 24px 0 #f472b655;
      transition: box-shadow 0.3s;
    }
    .header-glow:hover {
      box-shadow: 0 0 48px 0 #2563eb99, 0 8px 48px 0 #f472b6aa;
    }
    .drop-shadow-glow {
      filter: drop-shadow(0 0 8px #60a5fa) drop-shadow(0 0 16px #f472b6);
    }
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradientMove 3s linear infinite;
    }
    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .nav-link {
      position: relative;
      font-weight: 600;
      color: #2563eb;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      background: linear-gradient(90deg, #fff 60%, #fbc2eb22 100%);
    }
    .nav-link:hover, .nav-link:focus {
      color: #fff;
      background: linear-gradient(90deg, #2563eb 0%, #f472b6 100%);
      box-shadow: 0 0 12px #60a5fa, 0 0 24px #f472b6;
      outline: none;
    }
  </style>
</head>
<body class="bg-gradient-to-r from-blue-200 to-pink-100 min-h-screen">

  <!-- Enhanced Header Section -->
  <header class="flex justify-between items-center p-6 bg-white shadow-md fixed top-0 w-full z-20 border-b-4 border-blue-200 header-glow">
    <div class="flex items-center gap-3">
      <span class="animate-pulse text-blue-500 text-3xl drop-shadow-glow">🔐</span>
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-pink-500 to-yellow-400 drop-shadow-glow tracking-wide animate-gradient">
        FlyGrad
      </h1>
    </div>
    <nav class="space-x-6">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="housing.html" class="nav-link">Housing</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <a href="login.html" class="nav-link font-bold bg-blue-100">Login / Signup</a>
    </nav>
  </header>

  <!-- Login/Signup Card -->
  <main class="flex items-center justify-center min-h-screen pt-24">
    <div class="glass-card p-8 w-full max-w-md shadow-lg">
      <!-- Tab Switcher -->
      <div class="flex mb-8">
        <button id="loginTab" class="tab-btn flex-1 py-2 rounded-l-lg font-semibold focus:outline-none active" onclick="showTab('login')">Login</button>
        <button id="signupTab" class="tab-btn flex-1 py-2 rounded-r-lg font-semibold focus:outline-none" onclick="showTab('signup')">Sign Up</button>
      </div>
      <!-- Login Form -->
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-gray-700 mb-1" for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-gray-700 mb-1" for="loginPassword">Password</label>
          <input id="loginPassword" type="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">Login</button>
        <div class="text-right">
          <a href="#" class="text-blue-500 text-sm hover:underline">Forgot password?</a>
        </div>
      </form>
      <!-- Signup Form -->
      <form id="signupForm" class="space-y-6 hidden">
        <div>
          <label class="block text-gray-700 mb-1" for="signupName">Full Name</label>
          <input id="signupName" type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-gray-700 mb-1" for="signupEmail">Email</label>
          <input id="signupEmail" type="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="block text-gray-700 mb-1" for="signupPassword">Password</label>
          <input id="signupPassword" type="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <button type="submit" class="w-full py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition">Sign Up</button>
      </form>
    </div>
  </main>

  <script>
    // Tab switching logic
    function showTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
    }
    // Prevent default form submission for demo
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      alert('Login successful! (Demo)');
    };
    document.getElementById('signupForm').onsubmit = function(e) {
      e.preventDefault();
      alert('Signup successful! (Demo)');
    };
  </script>
</body>
</html>
